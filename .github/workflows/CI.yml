name: Build static binaries

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        #arch: [x86_64, aarch64, i686]
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          #platforms: arm64,386
          platforms: arm64

      - name: Run script in container
        run: |
          IMAGE="debian:unstable"

          if [ "${{ matrix.arch }}" == "aarch64" ]; then
            PLATFORM="linux/arm64"
          elif [ "${{ matrix.arch }}" == "i686" ]; then
            PLATFORM="linux/386"
          else
            PLATFORM="linux/amd64"
          fi

          docker run --rm --platform $PLATFORM -v $PWD:/workspace -w /workspace $IMAGE bash -c "\
            apt-get update && \
            apt-get install -y binutils busybox coreutils curl file findutils grep p7zip-full patchelf sed strace wget xz-utils zsync && \
            chmod +x ./utils-generator.sh && \
            ./utils-generator.sh"

          mkdir -p dist
          cp ./*-"${{ matrix.arch }}"-static dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: static-binaries-${{ matrix.arch }}
          path: dist

  release:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        #arch: [x86_64, aarch64, i686]
        arch: [x86_64, aarch64]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p merged
          find artifacts -type f -name "*-static" -exec cp {} merged/ \;

      # Snapshot Release
      #- name: Get date
      #  run: |
      #    SNAPSHOT_TAG="$(date --utc +'%Y%m%d-%H%M%S')"
      #    echo "SNAPSHOT_TAG=${SNAPSHOT_TAG}" >> "${GITHUB_ENV}"
      #- name: Create release
      #  uses: softprops/action-gh-release@v2
      #  with:
      #    name: "Snapshot Stable ${{ env.SNAPSHOT_TAG}}"
      #    tag_name: "${{ env.SNAPSHOT_TAG}}"
      #    prerelease: false
      #    draft: false
      #    generate_release_notes: false
      #    make_latest: false
      #    files: |
      #      merged/*-static
      #  env:
      #    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Continuous release
      - name: Release (${{ matrix.arch }})
        uses: marvinpinto/action-automatic-releases@latest
        with:
          title: ${{ matrix.arch }}
          automatic_release_tag: continuous-${{ matrix.arch }}
          prerelease: true
          draft: false
          files: |
            merged/*-${{ matrix.arch }}-static
          repo_token: ${{ secrets.GITHUB_TOKEN }}
