name: Build static binaries

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: arm64

      - name: Run script in container
        run: |
          IMAGE="debian:unstable"

          if [ "${{ matrix.arch }}" == "aarch64" ]; then
            PLATFORM="linux/arm64"
          else
            PLATFORM="linux/amd64"
          fi

          docker run --rm --platform $PLATFORM -v $PWD:/workspace -w /workspace $IMAGE bash -c "\
            apt-get update && \
            apt-get install -y \
              7zip-standalone \
              binutils bsdextrautils busybox bzip2 \
              coreutils curl \
              debianutils \
              file findutils \
              gawk grep \
              less libnotify-bin \
              p7zip-full patchelf procps psmisc \
              sed strace \
              unzip \
              wget \
              xz-utils \
              zsync && \
            chmod +x ./utils-generator.sh && \
            ./utils-generator.sh"

          mkdir -p dist
          cp ./*-"${{ matrix.arch }}"-static dist/
          cp ./*.sha256sum.txt dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: static-binaries-${{ matrix.arch }}
          path: dist

  release:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p merged
          find artifacts -type f -name "*-static" -exec cp {} merged/ \;
          find artifacts -type f -name "*.sha256sum.txt" -exec cp {} merged/ \;

      # Continuous release
      - name: Release (${{ matrix.arch }})
        uses: marvinpinto/action-automatic-releases@latest
        with:
          title: ${{ matrix.arch }}
          automatic_release_tag: continuous-${{ matrix.arch }}
          prerelease: true
          draft: false
          files: |
            merged/*-${{ matrix.arch }}-static
            merged/${{ matrix.arch }}.sha256sum.txt
          repo_token: ${{ secrets.GITHUB_TOKEN }}

      # Snapshot Release
      - name: get date
        run: |
          SNAPSHOT_TAG="$(date --utc +'%Y%m%d')"
          echo SNAPSHOT_TAG="${SNAPSHOT_TAG}" >> "${GITHUB_ENV}"
        continue-on-error: false
      - name: create snapshot
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ matrix.arch }}-${{ env.SNAPSHOT_TAG}}"
          tag_name: "${{ matrix.arch }}-${{ env.SNAPSHOT_TAG}}"
          prerelease: true
          draft: false
          generate_release_notes: false
          make_latest: false
          files: |
            merged/*-${{ matrix.arch }}-static
            merged/${{ matrix.arch }}.sha256sum.txt
        continue-on-error: false
